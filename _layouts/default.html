<!DOCTYPE html>
<html lang="{{ page.lang }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title | default: site.title }}</title>

  <link
    href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css"
    rel="stylesheet"
  />
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <link 
  rel="stylesheet" 
  href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.min.css"
/>

  <!-- YOUR CSS -->
  <link
    rel="stylesheet"
    href="{{ "/assets/style2.css" | relative_url }}"
  />
</head>
<body>

  {% if page.lang == "de" %}
    {% include header-de.html %}
  {% elsif page.lang == "en" %}
    {% include header-en.html %}
  {% endif %}

  <main>
    {{ content }}
  </main>

  {% if page.lang == "de" %}
    {% include footer-de.html %}
  {% elsif page.lang == "en" %}
    {% include footer-en.html %}
  {% endif %}

  <!-- YOUR JS -->
  <script
    src="{{ "/assets/script.js" | relative_url }}"
  ></script>
  <script
    src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"
  ></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/i18n/de.js"></script>

<script>
  document.addEventListener("DOMContentLoaded", function () {
    const input = document.querySelector("#phone");
    if (input) {
      const currentLang = document.documentElement.lang;

      const iti = window.intlTelInput(input, {
        initialCountry: "at",        // Austria default
        preferredCountries: ["at","de"], // show AT & DE on top
        i18n: currentLang === "de" ? window.intlTelInputGlobals.i18n : undefined,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"
      });

      // On submit → replace with full international number
      const form = input.closest("form");
      if (form) {
        form.addEventListener("submit", function () {
          input.value = iti.getNumber(); 
        });
      }
    }
  });
</script>
</body>
</html>
